<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Emerald - Login</title>
</head>

<body>
    <div class="auth-container">
        <div class="glass-card" style="max-width: 400px;">
            <h2 style="margin-bottom: 10px;">Emerald Tasks</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px; font-size: 14px;">Acesse seu workspace esmeralda.</p>
            <form action="dashboard.html">
                <label style="font-size: 12px; color: var(--text-dim);">E-MAIL</label>
                <input type="email" placeholder="usuario@emerald.com" required>

                <label style="font-size: 12px; color: var(--text-dim);">SENHA</label>
                <input type="password" placeholder="••••••••" required>

                <button type="submit" class="btn btn-emerald">Entrar no Sistema</button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-dim);">
                Ainda não tem uma conta?
                <a href="cadastro.html"
                    style="color: var(--primary-emerald); text-decoration: none; font-weight: 600;">Cadastre-se</a>
            </p>
            
        </div>
    </div>
</body>

</html>
