<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Esmerald - Cadastro</title>
</head>

<body>
    <div class="auth-container">
        <div class="glass-card" style="max-width: 400px;">
            <h2>Nova Conta</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px; font-size: 14px;">Junte-se à nossa rede de
                produtividade.</p>
            <form action="index.html">
                <label style="font-size: 12px; color: var(--text-dim);">NOME COMPLETO</label>
                <input type="text" placeholder="Seu nome" required>

                <label style="font-size: 12px; color: var(--text-dim);">E-MAIL</label>
                <input type="email" placeholder="usuario@emerald.com" required>

                <label style="font-size: 12px; color: var(--text-dim);">SENHA</label>
                <input type="password" placeholder="••••••••" required>

                <button type="submit" class="btn btn-emerald">Cadastrar</button>
            </form>

            <p style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-dim);">
                Já possui uma conta?
                <a href="index.html"
                    style="color: var(--primary-emerald); text-decoration: none; font-weight: 600;">Faça Login</a>
            </p>
        </div>
    </div>
</body>

</html>
